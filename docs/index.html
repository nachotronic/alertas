<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de fonts externes — Idescat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 13px; }
header { background: #3a3a3a; color: white; padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 15px; font-weight: bold; letter-spacing: 0.01em; }
header span { font-size: 11px; opacity: 0.6; }
.container { max-width: 1000px; margin: 1.5rem auto; padding: 0 1.5rem; }
.avís { background: #fdf8e8; border: 1px solid #e8d87a; border-radius: 4px; padding: 8px 14px; font-size: 11px; color: #7a6000; margin-bottom: 12px; display: none; }
.avís.visible { display: block; }
.card { background: white; border-radius: 4px; border: 1px solid #ddd; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
th { padding: 9px 14px; text-align: left; font-weight: bold; color: #444; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid #8B1A1A; background: #f7f7f7; }
td { padding: 11px 14px; border-bottom: 1px solid #ebebeb; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafaf8; }
.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 3px; font-weight: bold; }
.badge.comprovant         { background: #f3e8e8; color: #8B1A1A; border: 1px solid #d4a0a0; }
.badge.pendent_descarrega { background: #fdf0dc; color: #7a4a00; border: 1px solid #f0c878; }
.badge.incorporat         { background: #f0f0f0; color: #555; border: 1px solid #ccc; }
.badge.error              { background: #f8dcdc; color: #8B1A1A; border: 1px solid #d4a0a0; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.comprovant         { background: #8B1A1A; animation: pulse 1s infinite; }
.dot.pendent_descarrega { background: #d97706; }
.dot.incorporat         { background: #999; }
.dot.error              { background: #8B1A1A; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.btn { font-size: 11px; padding: 4px 10px; border-radius: 3px; border: 1px solid #bbb; background: white; color: #333; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-right: 5px; margin-top: 3px; }
.btn:hover { background: #f0f0f0; }
.btn.primary { background: #8B1A1A; color: white; border-color: #6a1414; }
.btn.primary:hover { background: #6a1414; }
.btn.success { background: #3a6a2a; color: white; border-color: #2a5020; }
.btn.success:hover { background: #2a5020; }
.nom-font { font-weight: bold; color: #222; font-size: 13px; }
.sub-font { font-size: 11px; color: #888; margin-top: 2px; }
.data-gran { font-size: 13px; font-weight: bold; }
.data-petit { font-size: 11px; color: #888; margin-top: 2px; }
.estat-extra { font-size: 11px; color: #777; margin-top: 4px; }
.desc-font { font-size: 11px; color: #666; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee; line-height: 1.4; }
.peu { font-size: 11px; color: #999; margin-top: 10px; }
.empty { text-align: center; padding: 30px; color: #aaa; }
</style>
</head>
<body>
<header>
  <h1>Idescat · Monitor de fonts estadístiques externes</h1>
  <span id="ts"></span>
</header>
<div class="container">
  <div class="avís" id="avis-cache">
    ⚠ L'Excel pot trigar 1-2 minuts a estar disponible després de la publicació. Si la descàrrega no és correcta, espereu uns instants i torneu-ho a intentar.
  </div>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th style="width:25%">Font</th>
          <th style="width:14%">Pròxima pub.</th>
          <th style="width:18%">Estat</th>
          <th style="width:43%">Procés i accions</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4" class="empty">Carregant...</td></tr>
      </tbody>
    </table>
  </div>
  <p class="peu" id="peu"></p>
</div>

<script>
function fmtData(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('ca-ES', {day:'2-digit', month:'2-digit', year:'numeric'});
}
function fmtDataHora(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('ca-ES', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
}
function fmtHora(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('ca-ES', {hour:'2-digit', minute:'2-digit'});
}
function diesPerA(iso) {
  if (!iso) return null;
  const ara = new Date();
  const pub = new Date(iso);
  // Comparar només dates, no hores
  const avuiStr = ara.toISOString().substring(0, 10);
  const pubStr  = pub.toISOString().substring(0, 10);
  if (pubStr === avuiStr) return 'avui';
  const diff = Math.ceil((pub - ara) / 86400000);
  if (diff < 0) return null;
  if (diff === 1) return 'demà';
  return `en ${diff} dies`;
}
function badge(estat) {
  const labels = {
    pendent_descarrega: 'Pendent de descàrrega',
    comprovant: 'Comprovant',
    incorporat: 'Incorporat',
    error: 'Error'
  };
  return `<span class="badge ${estat}"><span class="dot ${estat}"></span>${labels[estat]||estat}</span>`;
}
function marcarIncorporat(id) {
  const o = JSON.parse(sessionStorage.getItem('inc')||'{}');
  o[id] = true;
  sessionStorage.setItem('inc', JSON.stringify(o));
  render();
}

async function render() {
  const overrides = JSON.parse(sessionStorage.getItem('inc')||'{}');
  let data;
  try {
    const r = await fetch('status.json?t='+Date.now());
    data = await r.json();
  } catch(e) {
    document.getElementById('tbody').innerHTML='<tr><td colspan="4" class="empty">No s\'ha pogut carregar status.json</td></tr>';
    return;
  }

  const fonts = (data.fonts || []).slice().sort((a, b) => {
    if (!a.proper_publicacio && !b.proper_publicacio) return 0;
    if (!a.proper_publicacio) return 1;
    if (!b.proper_publicacio) return -1;
    return new Date(a.proper_publicacio) - new Date(b.proper_publicacio);
  });

  // Mostrar avís de caché si alguna font és pendent o comprovant
  const hiHaPendent = fonts.some(f => {
    const inc = overrides[f.id] || f.incorporat;
    const estat = f.estat || 'incorporat';
    return estat === 'pendent_descarrega' || estat === 'comprovant';
  });
  document.getElementById('avis-cache').classList.toggle('visible', hiHaPendent);

  let html = fonts.length === 0 ? '<tr><td colspan="4" class="empty">Cap font configurada.</td></tr>' : '';

  for (const f of fonts) {
    const inc = overrides[f.id] || f.incorporat;
    let estat = f.estat || 'incorporat';
    if (inc && estat === 'pendent_descarrega') estat = 'incorporat';

    const dies = diesPerA(f.proper_publicacio);
    const periodeRef = f.proper_periode_ref || null;
    const dataPub = f.proper_publicacio
      ? `<div class="data-gran">${fmtData(f.proper_publicacio)}</div>
         ${dies ? `<div class="data-petit">${dies}</div>` : ''}
         ${periodeRef ? `<div class="data-petit" style="color:#8B1A1A;margin-top:2px">${periodeRef}</div>` : ''}`
      : '<span style="color:#ccc">—</span>';

    let estatExtra = '';
    if (estat === 'comprovant') {
      estatExtra = `<div class="estat-extra">Intent ${f.intents||1} · proper: ${fmtHora(f.proper_intent)}</div>`;
    } else if (estat === 'pendent_descarrega' && f.darrera_pub) {
      estatExtra = `<div class="estat-extra">Actualitzat: ${fmtDataHora(f.darrera_pub)}</div>`;
    } else if (estat === 'incorporat' && f.darrer_periode) {
      estatExtra = `<div class="estat-extra">Darrer període: ${f.darrer_periode}</div>`;
    }

    let accions = '';
    if (estat === 'pendent_descarrega' && f.artefacte_url) {
      accions += `<a class="btn primary" href="${f.artefacte_url}?v=${Date.now()}" download>⬇ Descarregar Excel ${f.darrer_periode||''}</a>`;
      accions += `<button class="btn success" onclick="marcarIncorporat('${f.id}')">✓ Marcar incorporat</button>`;
    } else if (estat === 'incorporat' && f.artefacte_url) {
      accions += `<a class="btn" href="${f.artefacte_url}?v=${Date.now()}" download>⬇ Descarregar Excel ${f.darrer_periode||''}</a>`;
    } else if (estat === 'comprovant') {
      accions += `<a class="btn" href="https://github.com/${data.repo||''}/actions" target="_blank">↗ Veure procés</a>`;
    }

    if (f.descripcio) {
      accions += `<div class="desc-font">${f.descripcio}</div>`;
    }

    html += `<tr>
      <td><div class="nom-font">${f.nom}</div><div class="sub-font">${f.font} · ${f.tipus==='automatica'?'↻ automàtica':'↑ manual'}</div></td>
      <td>${dataPub}</td>
      <td>${badge(estat)}${estatExtra}</td>
      <td>${accions}</td>
    </tr>`;
  }

  document.getElementById('tbody').innerHTML = html;
  document.getElementById('ts').textContent = new Date().toLocaleTimeString('ca-ES');
  document.getElementById('peu').textContent = `${fonts.length} font${fonts.length!==1?'s':''} configurada${fonts.length!==1?'s':''} · refresc automàtic cada 30s`;
}
render();
setInterval(render, 30000);
</script>
</body>
</html>
