name: Hipoteques INE

on:
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 8,9,10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: pip install requests openpyxl

      - name: Comprovar calendari INE i obtenir data publicació
        id: calendari
        run: |
          python3 - <<'PYEOF'
          import urllib.request, datetime, re, os, json

          avui = datetime.date.today()
          toca = False
          proper_publicacio = None
          calendari_ok = False

          try:
              url = "https://www.ine.es/dynt3/Calendario/calenHTML.htm"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              html = urllib.request.urlopen(req, timeout=15).read().decode("utf-8")
              mes_ca = {1:"Enero",2:"Febrero",3:"Marzo",4:"Abril",5:"Mayo",6:"Junio",
                        7:"Julio",8:"Agosto",9:"Septiembre",10:"Octubre",11:"Noviembre",12:"Diciembre"}
              mes_inv = {v: k for k, v in mes_ca.items()}
              seccio = re.search(r'Hipotecas Mensual.*?(?=\n- [A-Z])', html, re.DOTALL)
              if seccio:
                  # Extreure dia | mes | periode_ref de cada fila
                  files = re.findall(r'\|\s*(\d+)\s*\|\s*(\w+)\s*\|\s*([^|\n]+?)\s*\|', seccio.group(0))
                  entrades = []
                  for dia, mes_str, periode_ref in files:
                      mes_num = mes_inv.get(mes_str.strip())
                      if mes_num:
                          try:
                              d = datetime.date(2026, mes_num, int(dia))
                              entrades.append((d, periode_ref.strip()))
                          except:
                              pass
                  entrades.sort(key=lambda x: x[0])
                  futures = [(d, p) for d, p in entrades if d >= avui]
                  if futures:
                      proper_publicacio = futures[0][0].isoformat()
                      proper_periode_ref = futures[0][1]
                      toca = futures[0][0] == avui
                      calendari_ok = True
                      print(f"Calendari OK. Proxima: {proper_publicacio} ({proper_periode_ref}) (avui={toca})")
                  else:
                      print("Calendari llegit pero sense dates futures")
              else:
                  print("Seccio Hipotecas Mensual no trobada")
          except Exception as e:
              print(f"Error calendari: {e}")

          if not calendari_ok:
              print("Fallback: consultant API del INE...")
              try:
                  api_url = "https://servicios.ine.es/wstempus/js/ES/DATOS_TABLA/13896?nult=1"
                  req2 = urllib.request.Request(api_url, headers={"User-Agent": "Mozilla/5.0"})
                  dades = json.loads(urllib.request.urlopen(req2, timeout=30).read())
                  periode_api = None
                  for s in dades:
                      if "Total Nacional" in s.get("Nombre", "") and "mero de hipotecas" in s.get("Nombre", ""):
                          d = s["Data"][0]
                          periode_api = f"{d['Anyo']}{d['FK_Periodo']:02d}"
                          break
                  if periode_api:
                      periode_status = None
                      try:
                          with open("docs/status.json") as f:
                              status = json.load(f)
                          for font in status.get("fonts", []):
                              if font["id"] == "hipoteques":
                                  periode_status = font.get("darrer_periode")
                                  break
                      except:
                          pass
                      if periode_api != periode_status:
                          toca = True
                          print(f"Fallback: nou periode ({periode_api} != {periode_status})")
                      else:
                          print(f"Fallback: cap canvi ({periode_api})")
              except Exception as e2:
                  print(f"Error fallback: {e2}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"toca={'true' if toca else 'false'}\n")
              f.write(f"proper_publicacio={proper_publicacio or ''}\n")
              try:
                  f.write(f"proper_periode_ref={proper_periode_ref}\n")
              except:
                  f.write("proper_periode_ref=\n")
          PYEOF

      - name: Actualitzar data publicació al status.json
        if: steps.calendari.outputs.proper_publicacio != ''
        run: |
          python3 - <<'PYEOF'
          import json, os

          proper = os.environ.get("PROPER_PUB", "")
          if not proper:
              exit(0)

          try:
              with open("docs/status.json") as f:
                  status = json.load(f)
          except:
              status = {"repo": "nachotronic/alertas", "fonts": []}

          entrada = next((f for f in status["fonts"] if f["id"] == "hipoteques"), None)
          if entrada:
              entrada["proper_publicacio"] = proper + "T09:00:00Z"
              if os.environ.get("PROPER_PERIODE_REF"):
                  entrada["proper_periode_ref"] = os.environ.get("PROPER_PERIODE_REF")
              with open("docs/status.json", "w") as f:
                  json.dump(status, f, ensure_ascii=False, indent=2)
              print(f"Data publicació actualitzada: {proper}")
          PYEOF
        env:
          PROPER_PUB: ${{ steps.calendari.outputs.proper_publicacio }}
          PROPER_PERIODE_REF: ${{ steps.calendari.outputs.proper_periode_ref }}

      - name: Comprovar si hi ha dades noves
        id: novedades
        if: steps.calendari.outputs.toca == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, os

          url = "https://servicios.ine.es/wstempus/js/ES/DATOS_TABLA/13896?nult=1"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          dades = json.loads(urllib.request.urlopen(req, timeout=30).read())

          periode_api = None
          for s in dades:
              if "Total Nacional" in s.get("Nombre", "") and "Número" in s.get("Nombre", ""):
                  d = s["Data"][0]
                  periode_api = f"{d['Anyo']}{d['FK_Periodo']:02d}"
                  break

          print(f"Període API: {periode_api}")

          periode_status = None
          try:
              with open("docs/status.json") as f:
                  status = json.load(f)
              for font in status.get("fonts", []):
                  if font["id"] == "hipoteques":
                      periode_status = font.get("darrer_periode")
                      break
          except:
              pass

          print(f"Període status: {periode_status}")
          nou = periode_api and periode_api != periode_status
          print(f"Dades noves: {nou}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"nou={'true' if nou else 'false'}\n")
              f.write(f"periode={periode_api or ''}\n")
          PYEOF

      - name: Actualitzar status — comprovant
        if: steps.calendari.outputs.toca == 'true' && steps.novedades.outputs.nou == 'false' && github.event_name != 'workflow_dispatch'
        run: |
          python3 - <<'PYEOF'
          import json, datetime, os

          ara = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          proper = (datetime.datetime.utcnow() + datetime.timedelta(minutes=5)).strftime("%Y-%m-%dT%H:%M:%SZ")

          try:
              with open("docs/status.json") as f:
                  status = json.load(f)
          except:
              status = {"repo": "nachotronic/alertas", "fonts": []}

          entrada = next((f for f in status["fonts"] if f["id"] == "hipoteques"), None)
          if entrada:
              intents = entrada.get("intents", 0) + 1
              entrada.update({
                  "estat": "comprovant",
                  "darrera_comprovacio": ara,
                  "proper_intent": proper,
                  "intents": intents,
              })

          with open("docs/status.json", "w") as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
          print(f"Status: comprovant (intent {intents})")
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status.json
          git diff --staged --quiet || git commit -m "Status: comprovant hipoteques $(date -u +%H:%M)"
          git pull --rebase origin main
          git push

      - name: Descarregar i transformar
        if: steps.novedades.outputs.nou == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 transform_hipoteques.py

      - name: Copiar Excel i actualitzar status — pendent de descàrrega
        if: steps.novedades.outputs.nou == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cp hipoteques_idescat.xlsx docs/hipoteques.xlsx

          python3 - <<'PYEOF'
          import json, datetime, os, urllib.request, re

          ara = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          periode = os.environ.get("PERIODE", "")
          repo    = os.environ.get("GITHUB_REPOSITORY", "")
          parts   = repo.split("/")
          usuari  = parts[0] if len(parts) > 0 else ""
          nom_repo = parts[1] if len(parts) > 1 else ""

          # Buscar la data SEGÜENT al calendari del INE (> avui)
          proper_publicacio = None
          try:
              avui = datetime.date.today()
              url = "https://www.ine.es/dynt3/Calendario/calenHTML.htm"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              html = urllib.request.urlopen(req, timeout=15).read().decode("utf-8")
              mes_ca = {1:"Enero",2:"Febrero",3:"Marzo",4:"Abril",5:"Mayo",6:"Junio",
                        7:"Julio",8:"Agosto",9:"Septiembre",10:"Octubre",11:"Noviembre",12:"Diciembre"}
              mes_inv = {v: k for k, v in mes_ca.items()}
              seccio = re.search(r'Hipotecas Mensual.*?(?=\n- [A-Z])', html, re.DOTALL)
              if seccio:
                  dates = re.findall(r'\|\s*(\d+)\s*\|\s*(\w+)\s*\|\s*(\d{4})', seccio.group(0))
                  futures = []
                  for dia, mes_str, any_str in dates:
                      mes_num = mes_inv.get(mes_str)
                      if mes_num:
                          try:
                              d = datetime.date(int(any_str), mes_num, int(dia))
                              if d > avui:  # > avui, no >= (la d'avui ja s'ha publicat)
                                  futures.append(d)
                          except:
                              pass
                  futures.sort()
                  if futures:
                      proper_publicacio = futures[0].isoformat() + "T09:00:00Z"
                      print(f"Proper publicació: {proper_publicacio}")
          except Exception as e:
              print(f"Error calendari: {e}")

          try:
              with open("docs/status.json") as f:
                  status = json.load(f)
          except:
              status = {"repo": repo, "fonts": []}

          entrada = next((f for f in status["fonts"] if f["id"] == "hipoteques"), None)
          if entrada:
              update = {
                  "estat": "pendent_descarrega",
                  "darrera_pub": ara,
                  "darrer_periode": periode,
                  "incorporat": False,
                  "intents": 0,
                  "proper_intent": None,
                  "artefacte_url": f"https://{usuari}.github.io/{nom_repo}/hipoteques.xlsx",
              }
              if proper_publicacio:
                  update["proper_publicacio"] = proper_publicacio
              entrada.update(update)

          with open("docs/status.json", "w") as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
          print(f"Status: pendent de descàrrega ({periode})")
          PYEOF
        env:
          PERIODE: ${{ steps.novedades.outputs.periode }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit final
        if: steps.novedades.outputs.nou == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status.json docs/hipoteques.xlsx
          git diff --staged --quiet || git commit -m "Update hipoteques ${{ steps.novedades.outputs.periode }}"
          git pull --rebase origin main
          git push

      - name: Commit data publicació
        if: steps.calendari.outputs.proper_publicacio != '' && steps.novedades.outputs.nou != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status.json
          git diff --staged --quiet || git commit -m "Update proper_publicacio hipoteques"
          git pull --rebase origin main
          git push

      - name: Log si no toca
        if: steps.calendari.outputs.toca == 'false' && github.event_name != 'workflow_dispatch'
        run: echo "Avui no toca hipoteques."
