name: Hipoteques INE

on:
  schedule:
    - cron: '10 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: pip install requests pandas openpyxl

      - name: Comprovar calendari INE
        id: calendari
        run: |
          python3 - <<'PYEOF'
          import urllib.request, datetime, re, os

          avui = datetime.date.today()
          print(f"Data avui: {avui}")

          try:
              url = "https://www.ine.es/dynt3/Calendario/calenHTML.htm"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              html = urllib.request.urlopen(req, timeout=15).read().decode("utf-8")

              mes_ca = {1:"Enero",2:"Febrero",3:"Marzo",4:"Abril",5:"Mayo",6:"Junio",
                        7:"Julio",8:"Agosto",9:"Septiembre",10:"Octubre",11:"Noviembre",12:"Diciembre"}
              mes_actual = mes_ca[avui.month]

              seccio = re.search(r'Hipotecas Mensual.*?(?=\n- [A-Z])', html, re.DOTALL)
              if seccio:
                  m = re.search(rf'\|\s*(\d+)\s*\|\s*{mes_actual}\s*\|', seccio.group(0))
                  if m and int(m.group(1)) == avui.day:
                      print("Avui toca hipoteques")
                      with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                          f.write("toca=true\n")
                  else:
                      dia = m.group(1) if m else "?"
                      print(f"No toca avui. Dia publicacio: {dia} {mes_actual}")
                      with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                          f.write("toca=false\n")
              else:
                  print("Seccio no trobada")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("toca=false\n")
          except Exception as e:
              print(f"Error: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("toca=false\n")
          PYEOF

      - name: Descarregar i transformar dades
        if: steps.calendari.outputs.toca == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 transform_hipoteques.py

      - name: Desar Excel com a artefacte
        if: steps.calendari.outputs.toca == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hipoteques-${{ github.run_id }}
          path: hipoteques_idescat.xlsx
          retention-days: 90

      - name: Actualitzar status.json
        if: steps.calendari.outputs.toca == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python3 - <<'PYEOF'
          import json, datetime, os

          STATUS_FILE = "docs/status.json"
          os.makedirs("docs", exist_ok=True)

          try:
              with open(STATUS_FILE) as f:
                  status = json.load(f)
          except Exception:
              status = {"fonts": []}

          ara = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          repo   = os.environ.get("GITHUB_REPOSITORY", "")

          # Buscar si ja existeix l'entrada
          entrada = next((f for f in status["fonts"] if f["id"] == "hipoteques"), None)
          if not entrada:
              entrada = {"id": "hipoteques"}
              status["fonts"].append(entrada)

          entrada.update({
              "nom":           "Hipoteques mensuals",
              "font":          "INE",
              "tipus":         "automatica",
              "estat":         "actualitzada",
              "darrera_pub":   ara,
              "incorporat":    False,
              "artefacte_url": f"https://github.com/{repo}/actions/runs/{run_id}",
              "font_url":      "https://www.ine.es/jaxiT3/Tabla.htm?t=13896",
          })

          with open(STATUS_FILE, "w") as f:
              json.dump(status, f, ensure_ascii=False, indent=2)

          print(f"status.json actualitzat: {ara}")
          PYEOF
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit status.json
        if: steps.calendari.outputs.toca == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/status.json
          git diff --staged --quiet || git commit -m "Update status: hipoteques $(date -u +%Y-%m-%d)"
          git push

      - name: Log sense canvis
        if: steps.calendari.outputs.toca == 'false' && github.event_name != 'workflow_dispatch'
        run: echo "Avui no toca hipoteques."
