name: Hipoteques INE

on:
  schedule:
    - cron: '10 8 * * *'
  workflow_dispatch:

jobs:
  check-and-transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar dependències
        run: pip install requests pandas openpyxl

      - name: Comprovar calendari INE
        id: calendari
        run: |
          python3 - <<'PYEOF'
          import urllib.request, datetime, re, os

          avui = datetime.date.today()
          print(f"Data avui: {avui}")

          try:
              url = "https://www.ine.es/dynt3/Calendario/calenHTML.htm"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              html = urllib.request.urlopen(req, timeout=15).read().decode("utf-8")

              mes_ca = {1:"Enero",2:"Febrero",3:"Marzo",4:"Abril",5:"Mayo",6:"Junio",
                        7:"Julio",8:"Agosto",9:"Septiembre",10:"Octubre",11:"Noviembre",12:"Diciembre"}
              mes_actual = mes_ca[avui.month]

              seccio = re.search(r'Hipotecas Mensual.*?(?=\n- [A-Z])', html, re.DOTALL)
              if seccio:
                  m = re.search(rf'\|\s*(\d+)\s*\|\s*{mes_actual}\s*\|', seccio.group(0))
                  if m and int(m.group(1)) == avui.day:
                      print(f"Avui toca hipoteques")
                      with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                          f.write("toca=true\n")
                  else:
                      dia = m.group(1) if m else "?"
                      print(f"No toca avui. Dia publicacio: {dia} {mes_actual}")
                      with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                          f.write("toca=false\n")
              else:
                  print("Seccio Hipotecas Mensual no trobada")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("toca=false\n")
          except Exception as e:
              print(f"Error: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("toca=false\n")
          PYEOF

      - name: Descarregar i transformar dades
        if: steps.calendari.outputs.toca == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 transform_hipoteques.py

      - name: Desar com a artefacte
        if: steps.calendari.outputs.toca == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: hipoteques-${{ github.run_id }}
          path: hipoteques_idescat.xlsx
          retention-days: 90

      - name: Enviar email
        if: steps.calendari.outputs.toca == 'true' || github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Hipoteques INE — dades noves"
          to: ${{ secrets.NOTIFY_EMAILS }}
          from: "Monitor Idescat <${{ secrets.GMAIL_USER }}>"
          body: |
            El INE ha publicat les dades mensuals d'hipoteques.
            Adjunt el fitxer Excel en format Idescat (CAT + ESP, 12 períodes).

            Font: https://www.ine.es/jaxiT3/Tabla.htm?t=13896
          attachments: hipoteques_idescat.xlsx

      - name: Log sense canvis
        if: steps.calendari.outputs.toca == 'false' && github.event_name != 'workflow_dispatch'
        run: echo "Avui no toca hipoteques."
